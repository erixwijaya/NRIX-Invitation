
<style>
*{box-sizing:border-box;margin:0;padding:0}

  --dk:#120D06;--dk2:#1C150C;
  --cr:#FAF7F1;--cr2:#F3EDE2;--cr3:#E5DDD0;
  --txt:#2A2016;--mt:#8C7A62;--bd:rgba(201,168,76,.15)
}
body{font-family:'DM Sans',sans-serif;background:var(--cr2);color:var(--txt);overflow-x:hidden}
/* NAV */
.nav{background:var(--dk);border-bottom:1px solid rgba(201,168,76,.12);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.1rem;color:var(--g2);letter-spacing:.06em;font-weight:500}
.nav-logo em{font-style:italic;color:var(--g);font-size:1.25rem}
.nav-sp{flex:1}
.nav-cta{padding:6px 16px;background:transparent;border:1px solid var(--g);color:var(--g);font-size:.71rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.nav-cta:hover{background:var(--g);color:var(--dk)}
/* HERO */
.hero{background:var(--dk);padding:52px 20px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:60px 60px}
.hero::after{content:'';position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);width:500px;height:160px;background:radial-gradient(ellipse,rgba(201,168,76,.1) 0%,transparent 70%);pointer-events:none}
.hero-tag{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--g);margin-bottom:14px;opacity:.85;position:relative;display:flex;align-items:center;justify-content:center;gap:8px}
.hero-tag::before,.hero-tag::after{content:'';width:24px;height:1px;background:var(--g);opacity:.5}
.hero-h1{font-size:clamp(1.8rem,5vw,3.2rem);font-weight:300;color:var(--cr);line-height:1.1;letter-spacing:.015em;position:relative;margin-bottom:5px}
.hero-h1 em{font-style:italic;color:var(--g)}
.hero-sub{font-size:.84rem;color:rgba(250,247,241,.45);max-width:400px;margin:10px auto 22px;line-height:1.7;font-weight:300;position:relative}
.hero-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 26px;background:var(--g);color:var(--dk);border:none;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .22s;position:relative}
.hero-btn:hover{background:var(--g2);transform:translateY(-2px)}
.hero-stats{display:flex;align-items:center;justify-content:center;margin-top:28px;border:1px solid rgba(201,168,76,.1);border-radius:8px;overflow:hidden;max-width:340px;margin-left:auto;margin-right:auto;position:relative}
.hs{flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(201,168,76,.08)}
.hs:last-child{border-right:none}
.hs-n{font-size:1.5rem;color:var(--g2);line-height:1}
.hs-l{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,247,241,.3);margin-top:2px}
/* THEMES */
.themes-wrap{padding:40px 16px 48px}
.sec-hd{text-align:center;margin-bottom:28px}
.sec-tag{font-size:.6rem;letter-spacing:.26em;text-transform:uppercase;color:var(--g);margin-bottom:8px}
.sec-title{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:300;color:var(--txt)}
.sec-title em{font-style:italic;color:var(--g3)}
.sec-sub{font-size:.82rem;color:var(--mt);margin-top:7px;line-height:1.65}
/* FILTER */
.filter{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:28px}
.fb{padding:6px 14px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:.7rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .18s}
.fb:hover{border-color:var(--g);color:var(--g3)}
.fb.on{background:var(--dk);border-color:var(--dk);color:var(--g2)}
/* GRID */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;max-width:1100px;margin:0 auto}
.tcard{background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 10px rgba(18,13,6,.07);transition:transform .26s,box-shadow .26s;cursor:pointer;overflow:hidden;position:relative}
.tcard:hover{transform:translateY(-7px);box-shadow:0 16px 48px rgba(18,13,6,.18)}
.tcard.hidden{display:none}
/* PREVIEW TOP */
.tcard-top{height:220px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
.tcard-bg{position:absolute;inset:0;transition:transform .35s}
.tcard:hover .tcard-bg{transform:scale(1.05)}
/* PHONE */
.phone{position:relative;z-index:2;width:90px;height:162px;background:#0a0a0a;border-radius:14px;border:2px solid #1a1a1a;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.06);transition:transform .28s;flex-shrink:0}
.tcard:hover .phone{transform:scale(1.06)}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:4px;background:#0a0a0a;border-radius:0 0 6px 6px;z-index:5}
.phone-scr{width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:7px 5px 5px}
.pc-em{font-size:14px;margin-bottom:4px}
.pc-photo{width:30px;height:40px;border-radius:50% 50% 44% 44%;overflow:hidden;margin-bottom:3px;border:1.5px solid}
.pc-photo img{width:100%;height:100%;object-fit:cover;display:block}
.pc-names{font-size:6.5px;line-height:1.2;text-align:center;margin-bottom:2px}
.pc-rule{width:14px;height:0.8px;margin:2px auto;border-radius:1px;opacity:.5}
.pc-date{font-size:3.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.55;margin-bottom:4px}
.pc-gal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5px;width:100%;margin-bottom:3px}
.pc-gi{height:16px;border-radius:1px;overflow:hidden}
.pc-gi img{width:100%;height:100%;object-fit:cover;display:block}
.pc-cd{display:flex;justify-content:center;gap:2px;margin-bottom:3px}
.pc-cdi{width:12px;height:12px;border-radius:1.5px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:0.8px solid;background:rgba(0,0,0,.18)}
.pc-cdi-n{font-size:4px;font-weight:600;line-height:1}
.pc-cdi-l{font-size:2.5px;opacity:.55;line-height:1}
.pc-mbtn{width:58%;padding:2.5px;border-radius:100px;font-size:3.5px;font-weight:600;text-align:center;margin:0 auto}
/* SIDE INFO */
.tcard-side{position:relative;z-index:2;margin-left:10px;flex:1;text-align:left}
.tcard-sn{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:3px}
.tcard-name-s{font-size:.9rem;font-weight:400;color:#fff;line-height:1.2;margin-bottom:2px}
.tcard-cat-s{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.tcard-feat{font-size:.6rem;color:rgba(255,255,255,.38);padding:1.5px 0;display:flex;align-items:center;gap:4px}
.tcard-feat::before{content:'✓';opacity:.45;font-size:.55rem;flex-shrink:0}
/* HOVER OVERLAY */
.tcard-ov{position:absolute;inset:0;z-index:4;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .22s}
.tcard:hover .tcard-ov{opacity:1}
.tcard-ov-btn{padding:8px 18px;background:#fff;color:var(--dk);border:none;border-radius:100px;font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transform:translateY(7px);transition:transform .22s;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tcard:hover .tcard-ov-btn{transform:translateY(0)}
/* BADGE */
.tbadge{position:absolute;top:10px;left:10px;z-index:10;font-size:.58rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:100px}
.tbadge-pop{background:var(--g);color:var(--dk)}
.tbadge-new{background:#ef4444;color:#fff}
.tbadge-feat{background:var(--dk);color:var(--g);border:1px solid var(--g)}
/* CARD BOTTOM */
.tcard-bot{padding:11px 14px 13px;border-top:1px solid rgba(0,0,0,.06);background:#fff;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tcard-bot-name{font-size:1rem;font-weight:600;color:var(--txt);line-height:1.1}
.tcard-bot-cat{font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mt);margin-top:1px}
.tcard-bot-acts{display:flex;gap:5px;flex-shrink:0}
.t-btn-p{padding:6px 12px;border-radius:6px;font-size:.7rem;font-weight:500;border:1.5px solid var(--dk);background:var(--dk);color:var(--cr);cursor:pointer;transition:all .18s;white-space:nowrap}
.t-btn-p:hover{background:var(--dk2)}
.t-btn-d{padding:6px 10px;border-radius:6px;font-size:.7rem;font-weight:500;border:1.5px solid var(--g);background:transparent;color:var(--g3);cursor:pointer;transition:all .18s}
.t-btn-d:hover{background:var(--g);color:#fff}
/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(8,5,2,.87);display:flex;align-items:center;justify-content:center;padding:10px;display:none}
.modal-bg.open{display:flex;animation:mfade .18s ease}
@keyframes mfade{from{opacity:0}to{opacity:1}}
@keyframes mup{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{background:#fff;border-radius:18px;width:100%;max-width:880px;max-height:94svh;overflow:hidden;display:flex;flex-direction:column;animation:mup .24s ease;box-shadow:0 28px 70px rgba(0,0,0,.42)}
.mbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(0,0,0,.07);background:#faf9f7;flex-shrink:0}
.micon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.mtitle{font-size:1.1rem;font-weight:400;color:var(--txt);line-height:1.2}
.msub{font-size:.63rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mt)}
.msp{flex:1}
.mcl{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.1);background:transparent;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mt);transition:all .14s;flex-shrink:0}
.mcl:hover{background:#efefef;color:var(--txt)}
.mdevbar{display:flex;align-items:center;gap:6px;padding:7px 16px;border-bottom:1px solid rgba(0,0,0,.05);background:#f4f2ef;flex-shrink:0}
.dvb{padding:4px 11px;border-radius:5px;border:1px solid rgba(0,0,0,.1);background:transparent;font-size:.7rem;font-weight:500;color:var(--mt);cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:4px}
.dvb.on,.dvb:hover{background:var(--dk);color:#fff;border-color:var(--dk)}
.mds{flex:1}
.mextlink{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid rgba(0,0,0,.1);border-radius:5px;font-size:.68rem;color:var(--mt);text-decoration:none;transition:all .14s;background:transparent;cursor:pointer}
.mextlink:hover{background:var(--dk);color:#fff;border-color:var(--dk)}
.mcanvas{flex:1;overflow:auto;background:#dcd8d0;display:flex;align-items:flex-start;justify-content:center;padding:18px;min-height:360px}
.fw{transition:all .26s}
.fw.desk{width:100%;max-width:760px;border-radius:10px;overflow:hidden;box-shadow:0 6px 36px rgba(0,0,0,.2)}
.fw.mob{width:375px;border-radius:32px;overflow:hidden;box-shadow:0 6px 36px rgba(0,0,0,.26),inset 0 0 0 1px rgba(0,0,0,.1)}
.fw iframe{width:100%;border:none;display:block}
.fw.desk iframe{height:500px}
.fw.mob iframe{height:580px}
.mfoot{padding:11px 16px;border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#faf9f7;flex-shrink:0}
.mfname{font-size:.96rem;font-weight:400;color:var(--txt)}
.mfdesc{font-size:.65rem;color:var(--mt);margin-top:1px}
.mfbtns{display:flex;gap:6px;flex-shrink:0}
.mf-dl{padding:8px 14px;border-radius:7px;font-size:.74rem;font-weight:500;border:1.5px solid var(--g);background:transparent;color:var(--g3);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.mf-dl:hover{background:var(--g);color:#fff}
.mf-ch{padding:8px 16px;border-radius:7px;font-size:.74rem;font-weight:500;border:none;background:var(--dk);color:var(--cr);cursor:pointer;transition:background .18s;white-space:nowrap}
.mf-ch:hover{background:var(--dk2)}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--dk);color:var(--cr);padding:9px 18px;border-radius:100px;font-size:.8rem;font-weight:500;opacity:0;transition:all .26s;z-index:999;display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.28);border:1px solid rgba(201,168,76,.15)}

var grid=document.getElementById('tGrid');

function buildCard(t){
  var card=document.createElement('div');
  card.className='tcard';card.dataset.cat=t.cat;

  if(t.badge){
    var b=document.createElement('div');
    b.className='tbadge tbadge-'+(t.badge==='popular'?'pop':t.badge==='new'?'new':'feat');
    b.textContent=t.badge==='popular'?'⭐ Popular':t.badge==='new'?'Baru':'✦ Featured';
    card.appendChild(b);
  }

  var top=document.createElement('div');top.className='tcard-top';
  var pbg=document.createElement('div');pbg.className='tcard-bg';pbg.style.cssText='position:absolute;inset:0;background:'+t.bg;
  top.appendChild(pbg);

  var phone=document.createElement('div');phone.className='phone';
  var notch=document.createElement('div');notch.className='phone-notch';phone.appendChild(notch);
  var scr=document.createElement('div');scr.className='phone-scr';scr.style.background=t.bg;
  scr.style.color=t.tc;

  scr.innerHTML='<div class="pc-em">'+t.em+'</div>'
    +'<div class="pc-photo" style="border-color:'+t.acc+'"><img src="https://picsum.photos/seed/'+t.s[0]+'/60/80" loading="lazy" alt=""></div>'
    +'<div class="pc-names" style="color:'+t.tc+'">'+t.n1+'<br><span style="color:'+t.acc+';font-style:italic">&amp;</span><br>'+t.n2+'</div>'
    +'<div class="pc-rule" style="background:'+t.acc+'"></div>'
    +'<div class="pc-date" style="color:'+t.tc+'">'+t.date+'</div>'
    +'<div class="pc-gal">'
    +[t.s[1],t.s[2],t.s[3]].map(function(s){return'<div class="pc-gi"><img src="https://picsum.photos/seed/'+s+'/40/55" loading="lazy" alt=""></div>';}).join('')
    +'</div>'
    +'<div class="pc-cd">'
    +['hr','mn','dt'].map(function(l){return'<div class="pc-cdi" style="border-color:'+t.acc+'">'
      +'<div class="pc-cdi-n" style="color:'+t.acc+'">00</div>'
      +'<div class="pc-cdi-l" style="color:'+t.tc+'">'+l+'</div></div>';}).join('')
    +'</div>'
    +'<div class="pc-mbtn" style="background:'+t.acc+';color:#0a0a0a">RSVP ✦</div>';

  phone.appendChild(scr);top.appendChild(phone);

  var side=document.createElement('div');side.className='tcard-side';
  side.innerHTML='<div class="tcard-sn">Tema 0'+t.id+'</div>'
    +'<div class="tcard-name-s">'+t.name+'</div>'
    +'<div class="tcard-cat-s" style="color:'+t.acc+';opacity:.85">'+t.catLbl+'</div>'
    +t.feats.map(function(f){return'<div class="tcard-feat">'+f+'</div>';}).join('');
  top.appendChild(side);

  var ov=document.createElement('div');ov.className='tcard-ov';
  var ovcta=document.createElement('button');ovcta.className='tcard-ov-btn';ovcta.textContent='👁 Preview';
  ovcta.onclick=function(e){e.stopPropagation();openModal(t);};
  ov.appendChild(ovcta);top.appendChild(ov);

  var bot=document.createElement('div');bot.className='tcard-bot';
  bot.innerHTML='<div><div class="tcard-bot-name">'+t.name+'</div><div class="tcard-bot-cat">'+t.catLbl+'</div></div>';
  var acts=document.createElement('div');acts.className='tcard-bot-acts';
  var bp=document.createElement('button');bp.className='t-btn-p';bp.textContent='Preview';
  bp.onclick=function(e){e.stopPropagation();openModal(t);};
  var bdl=document.createElement('button');bdl.className='t-btn-d';bdl.title='Download';bdl.textContent='⬇';
  bdl.onclick=function(e){e.stopPropagation();dlTheme(t);};
  acts.appendChild(bp);acts.appendChild(bdl);bot.appendChild(acts);

  card.appendChild(top);card.appendChild(bot);
  card.onclick=function(){openModal(t);};
  grid.appendChild(card);
}
T.forEach(buildCard);

document.querySelectorAll('.fb').forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll('.fb').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    var f=b.dataset.f;
    document.querySelectorAll('.tcard').forEach(function(c){
      c.classList.toggle('hidden',f!=='all'&&c.dataset.cat!==f);
    });
  };
});

var mbg=document.getElementById('modalBg');
var mfw=document.getElementById('mFW');
var mif=document.getElementById('mIF');
var cur=null;

function openModal(t){
  cur=t;
  document.getElementById('mIcon').textContent=t.em;
  document.getElementById('mIcon').style.background=t.bg;
  document.getElementById('mTitle').textContent=t.name;
  document.getElementById('mSub').textContent=t.catLbl+' · Tema 0'+t.id;
  document.getElementById('mFName').textContent=t.name;
  document.getElementById('mFDesc').textContent=t.desc;

  var extBtn=document.getElementById('mExt');
  extBtn.onclick=function(){
    var w=window.open(t.file,'_blank');
    if(!w){showToast('Buka file: '+t.file);} 
  };

  document.querySelectorAll('.dvb').forEach(function(b){b.classList.remove('on');});
  document.querySelector('.dvb[data-d="desk"]').classList.add('on');
  mfw.className='fw desk';
  mif.src=t.file;
  mbg.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  mbg.classList.remove('open');
  document.body.style.overflow='';
  setTimeout(function(){mif.src='';},300);
}
document.getElementById('mCl').onclick=closeModal;
mbg.onclick=function(e){if(e.target===mbg)closeModal();};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

document.querySelectorAll('.dvb').forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll('.dvb').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    mfw.className='fw '+b.dataset.d;
  };
});

function dlTheme(t){
  var a=document.createElement('a');
  a.href=t.file;
  a.download=t.file;
  a.target='_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('Downloading "'+t.name+'"...');
}

document.getElementById('mDL').onclick=function(){if(cur)dlTheme(cur);};
document.getElementById('mCH').onclick=function(){if(cur){closeModal();showToast('Tema "'+cur.name+'" dipilih! Hubungi kami via WhatsApp 🎉');}};

var toastTmr=null;
function showToast(msg){
  var el=document.getElementById('toast');
  document.getElementById('toastTxt').textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){el.classList.remove('show');},3400);
}
</script>
